# =============================================================================
# Sauna Controller — ESPHome Configuration
# Board: ESP32-WROOM-32 (esp32doit-devkit-v1)
#
# NOTE: This is a FIRMWARE REPLACEMENT for the PlatformIO firmware.
#       Flash with: esphome run sauna_esphome.yaml
#       The two firmwares cannot coexist on the same device.
#
# Key differences from the PlatformIO firmware:
#   - InfluxDB: not natively supported. Use HA recorder + InfluxDB addon instead.
#   - Web UI: replaced by ESPHome's built-in web server (basic sensor display).
#   - PID gain-switching (aggressive/conservative): single gain set per controller;
#     see the 'on_loop' automation comment below for a workaround.
#   - Motor calibration UI: removed; set outflow/inflow max steps as constants below.
#   - WebSocket broadcast: replaced by HA native API + MQTT.
# =============================================================================

esphome:
  name: sauna-controller
  friendly_name: Sauna Controller

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  level: INFO

# Home Assistant native API (preferred over MQTT alone)
api:
  encryption:
    key: ""  # generate with: esphome generate-api-key

ota:
  - platform: esphome
    password: ""  # set a secure OTA password

wifi:
  ssid: "pontifax"
  password: !secret wifi_password  # store in secrets.yaml
  ap:
    ssid: "Sauna Fallback AP"
    password: "sauna1234"

captive_portal:

# MQTT — enables Home Assistant MQTT Discovery in addition to native API
mqtt:
  broker: 192.168.1.125
  port: 1883
  # username: ""
  # password: ""
  discovery: true
  discovery_prefix: homeassistant
  topic_prefix: sauna

web_server:
  port: 80

# ---------------------------------------------------------------------------
# Hardware SPI — MAX31865 stove thermocouple
# ---------------------------------------------------------------------------
spi:
  clk_pin: GPIO18   # VSPI SCK
  miso_pin: GPIO19  # VSPI MISO
  mosi_pin: GPIO23  # VSPI MOSI

# ---------------------------------------------------------------------------
# Motor calibration constants
# Adjust to match your physical vent range (steps from closed to fully open).
# In the PlatformIO firmware these were calibrated at runtime and persisted.
# ---------------------------------------------------------------------------
globals:
  - id: outflow_max_steps
    type: int
    restore_value: true
    initial_value: '1024'
  - id: inflow_max_steps
    type: int
    restore_value: true
    initial_value: '1024'

# ---------------------------------------------------------------------------
# Stepper motors — ULN2003 / 28BYJ-48
# Pin order: IN1, IN2, IN3, IN4
# ---------------------------------------------------------------------------
stepper:
  - platform: uln2003
    id: outflow_motor
    pin_a: GPIO21
    pin_b: GPIO25
    pin_c: GPIO26
    pin_d: GPIO14
    max_speed: 250 steps/s
    sleep_when_done: false
    acceleration: inf
    deceleration: inf

  - platform: uln2003
    id: inflow_motor
    pin_a: GPIO22
    pin_b: GPIO27
    pin_c: GPIO32
    pin_d: GPIO33
    max_speed: 250 steps/s
    sleep_when_done: false
    acceleration: inf
    deceleration: inf

# ---------------------------------------------------------------------------
# Sensors
# ---------------------------------------------------------------------------
sensor:
  # Ceiling DHT21 (AM2301) — GPIO16
  - platform: dht
    pin: GPIO16
    model: AM2301
    update_interval: 2s
    temperature:
      name: "Ceiling Temperature"
      id: ceiling_temp
      unit_of_measurement: "°F"
      filters:
        - lambda: return x * 9.0 / 5.0 + 32.0;  # convert °C → °F
      on_value:
        then:
          - script.execute: ceiling_pid_loop
    humidity:
      name: "Ceiling Humidity"
      id: ceiling_hum

  # Bench DHT21 (AM2301) — GPIO17
  - platform: dht
    pin: GPIO17
    model: AM2301
    update_interval: 2s
    temperature:
      name: "Bench Temperature"
      id: bench_temp
      unit_of_measurement: "°F"
      filters:
        - lambda: return x * 9.0 / 5.0 + 32.0;
      on_value:
        then:
          - script.execute: bench_pid_loop
    humidity:
      name: "Bench Humidity"
      id: bench_hum

  # Stove MAX31865 PT1000 — CS GPIO5, 3-wire, Rref=4300Ω, Rnom=1000Ω
  - platform: max31865
    name: "Stove Temperature"
    id: stove_temp
    cs_pin: GPIO5
    rtd_wires: 3
    rtd_nominal_r: 1000
    reference_r: 4300
    unit_of_measurement: "°F"
    filters:
      - lambda: return x * 9.0 / 5.0 + 32.0;
    update_interval: 2s

  # Motor position readbacks (0–100%)
  - platform: template
    name: "Outflow Position"
    id: outflow_pos
    unit_of_measurement: "%"
    lambda: |-
      if (id(outflow_max_steps) == 0) return 0.0;
      return (float)id(outflow_motor).current_position / id(outflow_max_steps) * 100.0;
    update_interval: 2s

  - platform: template
    name: "Inflow Position"
    id: inflow_pos
    unit_of_measurement: "%"
    lambda: |-
      if (id(inflow_max_steps) == 0) return 0.0;
      return (float)id(inflow_motor).current_position / id(inflow_max_steps) * 100.0;
    update_interval: 2s

# ---------------------------------------------------------------------------
# PID setpoints — controllable from HA
# ---------------------------------------------------------------------------
number:
  - platform: template
    name: "Ceiling Setpoint"
    id: ceiling_setpoint
    min_value: 32
    max_value: 250
    step: 1
    unit_of_measurement: "°F"
    optimistic: true
    restore_value: true
    initial_value: 0
    set_action:
      - script.execute: ceiling_pid_loop

  - platform: template
    name: "Bench Setpoint"
    id: bench_setpoint
    min_value: 32
    max_value: 250
    step: 1
    unit_of_measurement: "°F"
    optimistic: true
    restore_value: true
    initial_value: 0
    set_action:
      - script.execute: bench_pid_loop

  # Motor calibration — set max open steps at runtime
  - platform: template
    name: "Outflow Max Steps"
    id: outflow_max_steps_num
    min_value: 64
    max_value: 4096
    step: 1
    unit_of_measurement: "steps"
    optimistic: true
    restore_value: true
    initial_value: 1024
    set_action:
      - globals.set:
          id: outflow_max_steps
          value: !lambda return (int)x;

  - platform: template
    name: "Inflow Max Steps"
    id: inflow_max_steps_num
    min_value: 64
    max_value: 4096
    step: 1
    unit_of_measurement: "steps"
    optimistic: true
    restore_value: true
    initial_value: 1024
    set_action:
      - globals.set:
          id: inflow_max_steps
          value: !lambda return (int)x;

# ---------------------------------------------------------------------------
# PID enable switches
# ---------------------------------------------------------------------------
switch:
  - platform: template
    name: "Ceiling PID"
    id: ceiling_pid_en
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - script.execute: ceiling_pid_loop
    turn_off_action:
      - stepper.set_target:
          id: outflow_motor
          target: 0

  - platform: template
    name: "Bench PID"
    id: bench_pid_en
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - script.execute: bench_pid_loop
    turn_off_action:
      - stepper.set_target:
          id: inflow_motor
          target: 0

# ---------------------------------------------------------------------------
# Motor control buttons (manual jog, open/close)
# ---------------------------------------------------------------------------
button:
  - platform: template
    name: "Outflow Open"
    on_press:
      - stepper.set_target:
          id: outflow_motor
          target: !lambda return id(outflow_max_steps);

  - platform: template
    name: "Outflow Close"
    on_press:
      - stepper.set_target:
          id: outflow_motor
          target: 0

  - platform: template
    name: "Inflow Open"
    on_press:
      - stepper.set_target:
          id: inflow_motor
          target: !lambda return id(inflow_max_steps);

  - platform: template
    name: "Inflow Close"
    on_press:
      - stepper.set_target:
          id: inflow_motor
          target: 0

# ---------------------------------------------------------------------------
# PID control loops implemented as scripts (run every sensor update)
#
# Replicates the aggressive/conservative gain-switching from the firmware:
#   gap >= 10°F → aggressive  (Kp=4, Ki=0.2, Kd=1)
#   gap <  10°F → conservative (Kp=1, Ki=0.05, Kd=0.25)
#
# A proper continuous PID with integral accumulation would require a
# custom_component. This is a proportional-only approximation that runs
# on each sensor update (every 2 s) and sets absolute stepper position.
# ---------------------------------------------------------------------------
script:
  - id: ceiling_pid_loop
    mode: restart
    then:
      - lambda: |-
          if (!id(ceiling_pid_en).state) return;
          float temp = id(ceiling_temp).state;
          float sp   = id(ceiling_setpoint).state;
          if (isnan(temp)) return;
          float gap = fabsf(sp - temp);
          float kp  = (gap >= 10.0f) ? 4.0f : 1.0f;
          float err = sp - temp;
          // Proportional-only output, clamped 0–100%
          float out = kp * err / 50.0f;  // normalise: full output at 50°F error
          out = fmaxf(0.0f, fminf(1.0f, out));
          int target = (int)(out * id(outflow_max_steps));
          id(outflow_motor).set_target(target);

  - id: bench_pid_loop
    mode: restart
    then:
      - lambda: |-
          if (!id(bench_pid_en).state) return;
          float temp = id(bench_temp).state;
          float sp   = id(bench_setpoint).state;
          if (isnan(temp)) return;
          float gap = fabsf(sp - temp);
          float kp  = (gap >= 10.0f) ? 4.0f : 1.0f;
          float err = sp - temp;
          float out = kp * err / 50.0f;
          out = fmaxf(0.0f, fminf(1.0f, out));
          int target = (int)(out * id(inflow_max_steps));
          id(inflow_motor).set_target(target);
