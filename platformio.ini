; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = lb_esp32s3

; ─── Shared library list ────────────────────────────────────────────────────
[common_libs]
lib_deps =
	adafruit/Adafruit Unified Sensor@^1.1.15
	adafruit/DHT sensor library@^1.4.7
	links2004/WebSockets@^2.4.0
	tobiasschuerg/ESP8266 Influxdb@^3.13.2
	adafruit/Adafruit MAX31865 library@^1.6.2
	dlloydev/QuickPID@^3.1.9
	tyhenry/CheapStepper@^0.2.1
	knolleary/PubSubClient@^2.8
	adafruit/Adafruit INA260 Library@^1.5.3
	bblanchon/ArduinoJson@^7.0.0

; ─── Shared application build flags ────────────────────────────────────────
[common_build_flags]
build_flags =
	-Wno-parentheses
	-DDEFAULT_CEILING_SP_F=160.0f
	-DDEFAULT_BENCH_SP_F=120.0f
	-DFIRMWARE_VERSION=\"2.0.0\"
	; Optional overrides — uncomment and adjust to change defaults:
	; -DTEMP_LIMIT_C=115.0f
	; -DSERIAL_LOG_INTERVAL_MS=5000
	; -DSTALE_THRESHOLD_MS=15000UL
	; -DINFLUX_WRITE_INTERVAL_MS=30000UL
	; -DMQTT_RECONNECT_INTERVAL_MS=10000UL
	; -DMOTOR_RPM=10
	; -DPID_MIN_STEP_DELTA=3
	; -DPID_CONSERVATIVE_THRESHOLD_C=15.0f
	; -DWS_JSON_BUF_SIZE=512
	; -DMQTT_BUF_SIZE=1024
	; -DNTP_SERVER_LOCAL=\"192.168.1.1\"
	; -DWIFI_GATEWAY_IP=192,168,1,1
	; -DWIFI_DNS_IP=1,1,1,1
	; -DDEFAULT_STATIC_IP=\"192.168.1.201\"
	; -DDEFAULT_SENSOR_READ_INTERVAL_MS=5000UL

; ─── LB-ESP32S3-N16R8 (PRIMARY — current hardware) ────────────────────────
; Board:   Lonely Binary ESP32-S3 N16R8
; MCU:     ESP32-S3 @ 240 MHz (dual Xtensa LX7)
; Flash:   16 MB (OPI QIO)
; PSRAM:   8 MB (OPI)
; USB:     Dual — UART connector (GPIO43/44) + native USB OTG (GPIO19/20)
; GPIO:    All pin assignments in src/gpio_config.h
[env:lb_esp32s3]
platform = espressif32
board = lolin_s3
framework = arduino
lib_deps = ${common_libs.lib_deps}
monitor_speed = 115200
; lolin_s3 defaults: 16MB flash, 8MB OPI PSRAM, USB-CDC off (UART0 for serial)
; -DARDUINO_USB_CDC_ON_BOOT=0 : Serial goes to UART0 (GPIO43 TX / GPIO44 RX)
;   so the UART USB connector is used for serial monitor and upload.
;   Set to 1 only if using the native USB connector for Serial.
build_flags =
	${common_build_flags.build_flags}
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=0
board_build.filesystem = littlefs
board_build.filesystem_data_dir = data
board_build.partitions = partitions_ota_16mb.csv
board_build.arduino.memory_type = qio_opi
targets = upload, uploadfs
extra_scripts = scripts/upload_fs.py

; ─── ESP32 DOIT DevKit V1 (LEGACY — previous hardware, keep for reference) ──
; Board:   DOIT ESP32 DevKit V1
; MCU:     ESP32-WROOM-32 @ 240 MHz
; Flash:   4 MB
; PSRAM:   None
; Note:    main.cpp + gpio_config.h now target ESP32-S3 GPIO assignments.
;          This env still compiles but GPIO numbers will not match the old board.
;          Kept for reference only; do not flash to old hardware.
[env:upesy_wroom]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
lib_deps = ${common_libs.lib_deps}
monitor_speed = 115200
build_flags = ${common_build_flags.build_flags}
board_build.filesystem = littlefs
board_build.filesystem_data_dir = data
board_build.partitions = partitions_ota.csv
targets = upload, uploadfs
extra_scripts = scripts/upload_fs.py

; ─── Native unit tests ──────────────────────────────────────────────────────
[env:native]
platform = native
build_flags = -std=c++14 -Wno-narrowing
test_build_src = false
test_framework = unity
